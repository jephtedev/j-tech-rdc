<!DOCTYPE html>
<html lang="fr" class="bg-[#05060A]">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J-TECH RDC | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px;
        }
        .app-iframe { width: 100%; height: 580px; border: none; }
    </style>
</head>
<body class="p-4 md:p-10 font-sans text-white">

    <div class="flex justify-between items-center mb-10">
        <div>
            <h1 class="text-4xl font-black tracking-tighter">J-TECH <span class="text-blue-500">RDC</span></h1>
            <p class="text-slate-500 font-medium">Système nerveux des services nationaux</p>
        </div>
        <div class="flex gap-4">
            <div class="px-6 py-2 bg-blue-600 rounded-full text-xs font-bold uppercase tracking-widest shadow-lg shadow-blue-900/20">
                Mode Architecte : Actif
            </div>
        </div>
    </div>

    <main class="grid grid-cols-1 md:grid-cols-3 gap-8">
        <div class="glass-panel p-3">
            <h3 class="text-center font-bold mb-3 opacity-50 text-sm">INTERFACE CLIENT</h3>
            <iframe src="client.html" class="app-iframe"></iframe>
        </div>
        <div class="glass-panel p-3">
            <h3 class="text-center font-bold mb-3 opacity-50 text-sm">INTERFACE TECHNICIEN</h3>
            <iframe src="technicien.html" class="app-iframe"></iframe>
        </div>
        <div class="glass-panel p-3">
            <h3 class="text-center font-bold mb-3 opacity-50 text-sm">CONSOLE ADMIN</h3>
            <iframe src="admin.html" class="app-iframe"></iframe>
        </div>
    </main>

</body>
</html>
