<!DOCTYPE html>
<html lang="fr" class="bg-[#0B0E14]">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Technicien | J-TECH HUB</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="text-white p-6 antialiased">

    <!-- Header Profil -->
    <header class="flex justify-between items-center mb-8">
        <div>
            <h2 class="text-xs text-slate-400 font-medium">Bonjour,</h2>
            <h1 class="text-2xl font-black tracking-tight">Jean le Maçon</h1>
        </div>
        <div class="relative">
            <div class="w-10 h-10 bg-green-500 rounded-full shadow-[0_0_15px_rgba(34,197,94,0.4)]"></div>
            <!-- Indicateur de statut en temps réel -->
            <span class="absolute top-0 right-0 w-3 h-3 bg-green-500 border-2 border-[#0B0E14] rounded-full"></span>
        </div>
    </header>

    <!-- Stats Grid : Indicateurs de performance -->
    <section class="grid grid-cols-2 gap-4 mb-8">
        <div class="bg-[#161B22] p-5 rounded-2xl border border-white/5 shadow-lg">
            <p class="text-[10px] text-slate-400 uppercase tracking-widest mb-1">En séquestre</p>
            <p class="font-black text-xl text-orange-500">$75.00</p>
        </div>
        <div class="bg-[#161B22] p-5 rounded-2xl border border-white/5 shadow-lg">
            <p class="text-[10px] text-slate-400 uppercase tracking-widest mb-1">Missions</p>
            <p class="font-black text-xl">03</p>
        </div>
    </section>

    <!-- Demandes entrantes : Interface de matching -->
    <section>
        <h3 class="text-sm font-bold mb-4 tracking-tight">Demandes entrantes</h3>
        <div class="space-y-4">
            <article class="bg-gradient-to-r from-blue-600 to-blue-700 p-5 rounded-3xl flex justify-between items-center shadow-xl shadow-blue-900/20">
                <div>
                    <h4 class="font-bold text-lg">Urgence Plomberie</h4>
                    <p class="text-xs font-medium opacity-90">📍 Gombe • 14:00</p>
                </div>
                <button class="bg-white text-blue-700 px-5 py-3 rounded-2xl text-[11px] font-black shadow-lg hover:bg-gray-100 transition-colors">
                    ACCEPTER
                </button>
            </article>
        </div>
    </section>

</body>
            </html>
